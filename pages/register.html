<div class="content" style="max-width: 500px; margin: 60px auto;">
  <div class="card" style="padding: 40px; box-shadow: 0 12px 48px rgba(0,0,0,0.4);">
    <h1 style="text-align:center; font-family:var(--font-display); margin-bottom: 8px;">Create Account</h1>
    <p style="text-align:center; color:var(--muted); margin-bottom: 32px;">Join the Linux Roadmap community.</p>
    
    <form id="full-register-form" style="display:flex; flex-direction:column; gap:20px;">
      <div style="display:flex; flex-direction:column; gap:8px;">
        <label style="font-size:14px; font-weight:600; color:var(--muted);">Full Name</label>
        <input type="text" id="reg-fullname" placeholder="John Doe" required style="padding:12px; border-radius:8px; border:1px solid var(--border); background:rgba(0,0,0,0.2); color:white; outline:none; font-family:var(--font-sans);">
      </div>

      <div style="display:flex; flex-direction:column; gap:8px;">
        <label style="font-size:14px; font-weight:600; color:var(--muted);">Username</label>
        <input type="text" id="reg-username" placeholder="johndoe123" required style="padding:12px; border-radius:8px; border:1px solid var(--border); background:rgba(0,0,0,0.2); color:white; outline:none; font-family:var(--font-sans);">
      </div>

      <div style="display:flex; flex-direction:column; gap:8px;">
        <label style="font-size:14px; font-weight:600; color:var(--muted);">Email Address</label>
        <input type="email" id="reg-email" placeholder="email@example.com" required style="padding:12px; border-radius:8px; border:1px solid var(--border); background:rgba(0,0,0,0.2); color:white; outline:none; font-family:var(--font-sans);">
      </div>

      <div style="display:flex; flex-direction:column; gap:8px;">
        <label style="font-size:14px; font-weight:600; color:var(--muted);">Password</label>
        <input type="password" id="reg-password" placeholder="••••••••" required minlength="6" style="padding:12px; border-radius:8px; border:1px solid var(--border); background:rgba(0,0,0,0.2); color:white; outline:none; font-family:var(--font-sans);">
      </div>

      <button type="submit" class="btn" style="padding:14px; font-size:16px; margin-top:10px;">Create My Account</button>
      
      <div id="reg-error" style="color:var(--danger); font-size:14px; text-align:center; display:none; padding:10px; background:rgba(224, 27, 36, 0.1); border-radius:6px;"></div>
      <div id="reg-success" style="color:var(--accent); font-size:14px; text-align:center; display:none; padding:10px; background:rgba(38, 162, 105, 0.1); border-radius:6px;"></div>

      <p style="text-align:center; font-size:14px; color:var(--muted); margin-top:16px;">
        Already have an account? <a href="#/1" onclick="document.getElementById('auth-modal').showModal()" style="color:var(--brand); text-decoration:none; font-weight:600;">Log In</a>
      </p>
    </form>
  </div>
</div>
